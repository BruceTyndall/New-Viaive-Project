              - text: reopens Q1 2026 after a multi-year renovation that brings the New York Bar back without compromising the Lost in Translation interiors. If you have not been to Tokyo since 2023, the hotel landscape has been rebuilt under you.
            - heading "The Standard That Still Holds" [level=3] [ref=e486]
            - paragraph [ref=e487]:
              - link "Aman Tokyo" [ref=e488] [cursor=pointer]:
                - /url: https://www.stay22.com/allez/booking?aid=STAY22_AID_PLACEHOLDER&q=Aman%20Tokyo%20Tokyo
              - text: remains the standard. Six years in, the property has not slipped — we audit it every quarter and the silence still works. The Aman Suite is the placement; the standard rooms are quieter and lower without the 33rd-floor framing. For travelers who want Japan-first rather than international,
              - link "Hoshinoya Tokyo" [ref=e489] [cursor=pointer]:
