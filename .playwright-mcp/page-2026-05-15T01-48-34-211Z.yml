              - text: is a ryokan stacked seventeen floors high — tatami floors, onsen on the top floor, shoes off at the lobby — and it is the most genuinely-Japanese stay in the city. For the suite-category traveler who wants altitude,
              - link "Four Seasons Hotel Tokyo at Otemachi" [ref=e490] [cursor=pointer]:
                - /url: https://www.stay22.com/allez/booking?aid=STAY22_AID_PLACEHOLDER&q=Four%20Seasons%20Hotel%20Tokyo%20at%20Otemachi%20Tokyo
