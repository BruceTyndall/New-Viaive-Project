            - heading "When To Go — Cherry Blossoms, Maples, And The Rest" [level=3] [ref=e491]
            - paragraph [ref=e492]:
              - text: "March 20 through April 5 for cherry blossom — book by July of the prior year, no exceptions. October 25 through November 25 for koyo, the maple season, which is quieter and arguably more beautiful. Skip June (rainy season), August (humidity, locals leave), and the New Year week (every restaurant of consequence closes). For 2026 specifically: the cherry-blossom forecast tilts a week earlier than the ten-year average per JMA preliminary data — book"
              - link "Aman Tokyo" [ref=e493] [cursor=pointer]:
                - /url: https://www.stay22.com/allez/booking?aid=STAY22_AID_PLACEHOLDER&q=Aman%20Tokyo%20Tokyo
