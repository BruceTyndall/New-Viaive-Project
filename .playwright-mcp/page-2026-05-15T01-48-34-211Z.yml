              - text: "'s rooftop bar instead). Book three months ahead: any kaiseki at the level of Ryugin, Den, Florilège or Kohaku. Book four months ahead: Sukiyabashi Jiro Honten (not the Roppongi outpost). Book day-of: most ramen, sushi at Sushi Sho if the desk has a relationship. Every hotel above is bookable through Viaive's preferred-partner programs — Four Seasons Preferred, Virtuoso, Aman Inner Circle — with complimentary upgrades, daily breakfast for two, and the kind of room placement the public booking engine cannot offer."
