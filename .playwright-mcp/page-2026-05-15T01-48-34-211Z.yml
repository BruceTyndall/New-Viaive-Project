              - text: "'s Grand Beach Villa with private pool (the largest beachfront footprint in the country); and"
              - link "Cheval Blanc Randheli" [ref=e337] [cursor=pointer]:
                - /url: https://www.stay22.com/allez/booking?aid=STAY22_AID_PLACEHOLDER&q=Cheval%20Blanc%20Randheli%20Maldives
              - text: "'s 1-Bedroom Garden Water Villa — the suite our hotel desk repeats most often. For families,"
              - link "Joali Maldives" [ref=e338] [cursor=pointer]:
                - /url: https://www.stay22.com/allez/booking?aid=STAY22_AID_PLACEHOLDER&q=Joali%20Maldives%20Maldives
              - text: "'s 2-Bedroom Beach Villa with Pool is the calculated buy."
            - heading "When To Go — And When Not To" [level=3] [ref=e339]
            - paragraph [ref=e340]:
              - text: "Peak: late December through March (premium pricing, perfect weather, full reefs). Shoulder: November and April (15–25% lower, identical water clarity most weeks). Avoid: May–October monsoon, unless you want surf at"
